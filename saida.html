<script>
const URL = "https://script.google.com/macros/s/AKfycbxU8cQGboYQ80VZuymzfCj_ZMzMSyk2XGKkq7AZT0dZSY1oJljTPFhASZilVbf0wo1I-A/exec";

function buscarKm() {
  fetch(URL, {
    method: "POST",
    body: JSON.stringify({ acao: "buscarKm", re: re.value })
  })
  .then(r => r.json())
  .then(d => kmInicial.value = d.km);
}

function enviarSaida() {
  fetch(URL, {
    method: "POST",
    body: JSON.stringify({
      acao: "saida",
      posto: posto.value,
      re: re.value,
      kmInicial: kmInicial.value,
      horaSaida: horaSaida.value
    })
  })
  .then(() => alert("Saída registrada"));
}
</script>
