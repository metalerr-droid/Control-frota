<script>
const URL = "COLE_AQUI_A_URL_DO_SCRIPT";

function buscarKm() {
  fetch(URL, {
    method: "POST",
    body: JSON.stringify({ acao: "buscarKm", re: re.value })
  })
  .then(r => r.json())
  .then(d => kmInicial.value = d.km);
}

function enviarSaida() {
  fetch(URL, {
    method: "POST",
    body: JSON.stringify({
      acao: "saida",
      posto: posto.value,
      re: re.value,
      kmInicial: kmInicial.value,
      horaSaida: horaSaida.value
    })
  })
  .then(() => alert("Saída registrada"));
}
</script>
